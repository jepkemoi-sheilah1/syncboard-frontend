<div class="sidebar">
  <!-- Workspace avatar circle + workspace name -->
  <div class="sidebar-header">
    <div class="sidebar-avatar">{{ workspaceName() | slice:0:1 | uppercase }}</div>
    <div class="sidebar-name">{{ workspaceName() }}</div>
  </div>

  <!-- Nav links -->
  <nav class="sidebar-nav">
    <a
      class="sidebar-nav-item"
      [routerLink]="['/workspaces', workspaceId(), 'boards']"
      routerLinkActive="active"
    >
      <mat-icon>view_list</mat-icon>
      <span>Boards</span>
    </a>

    <a
      class="sidebar-nav-item"
      [routerLink]="['/workspaces', workspaceId(), 'members']"
      routerLinkActive="active"
    >
      <mat-icon>people</mat-icon>
      <span>Members</span>
    </a>
  </nav>

  <!-- Your Boards section -->
  <section class="sidebar-boards">
    <div class="sidebar-boards-title">Your Boards</div>

    <a
      class="sidebar-board-item"
      *ngFor="let b of boards; trackBy: trackByBoardId"
      [routerLink]="['/board', b.id]"
    >
      <span class="sidebar-board-swatch" [style.background]="boardSwatchColor(b)"></span>
      <span class="sidebar-board-name">{{ b.boardName }}</span>
    </a>
  </section>

  <!-- Logout button -->
  <div class="sidebar-footer">
    <button class="sidebar-logout" mat-icon-button (click)="logout()" aria-label="Logout">
      <mat-icon>logout</mat-icon>
      <span class="sidebar-logout-label">Logout</span>
    </button>
  </div>
</div>
