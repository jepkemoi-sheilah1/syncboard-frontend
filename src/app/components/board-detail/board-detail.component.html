<div class="board-detail-container">
  <header class="board-header">
    <div class="board-title-section">
      <button class="btn-back" (click)="goBack()">← Back</button>
      <h1 *ngIf="board(); else loadingBoard">{{ board()?.boardName || 'Board' }}</h1>
      <ng-template #loadingBoard><h1>Loading...</h1></ng-template>
    </div>
  </header>

  <div class="lists-container" cdkDropListGroup>
    <div class="list-column" *ngFor="let list of lists()">
      <div class="list-header">
        
        <h3>{{ list.name }}</h3>
        <span class="card-count">{{ list.cards?.length || 0 }}</span>
      </div>
      <div class="cards-container" cdkDropList [cdkDropListData]="list.cards || []" (cdkDropListDropped)="drop($event, list.id)">
        <div class="card" *ngFor="let card of list.cards" cdkDrag [cdkDragData]="card" (click)="openCardModal(card)">
          <div class="card-labels" *ngIf="card.labels?.length">
            <span class="label-dot" *ngFor="let label of card.labels" [style.background-color]="label.color" [title]="label.name"></span>
          </div>
          <div class="card-title">{{ card.title }}</div>
          <div class="card-footer">
            <span class="due-date" *ngIf="card.dueDate">📅</span>
            <span class="assignee" *ngIf="card.assignee">{{ getInitials(card.assignee) }}</span>
          </div>
        </div>
        <div class="inline-card-form" *ngIf="activeCardListId() === list.id">
          <textarea [(ngModel)]="newCardTitle" placeholder="Enter card title..." class="card-input" (keyup.enter)="createCardInline(list.id)" (keyup.escape)="closeCardInput()" rows="2"></textarea>
          <div class="inline-form-actions">
            <button class="btn-create" (click)="createCardInline(list.id)">Add Card</button>
            <button class="btn-cancel-inline" (click)="closeCardInput()">✕</button>
          </div>
        </div>
        <button class="btn-add-card" *ngIf="activeCardListId() !== list.id" (click)="toggleCardInput(list.id, $event)">
          + Add Card
        </button>
      </div>
    </div>

    <div class="list-column add-list-column">
      <div *ngIf="!showNewListInput(); else newListForm">
        <button class="btn-add-list" (click)="toggleNewListInput()">
          + {{ lists().length === 0 ? 'Add a list' : 'Add another list' }}
        </button>
      </div>
      <ng-template #newListForm>
        <div class="new-list-form">
          <input type="text" [(ngModel)]="newListName" placeholder="Enter list name..." class="list-name-input" (keyup.enter)="createList()" #listInput autofocus>
          <div class="form-actions">
            <button class="btn-create" (click)="createList()">Add List</button>
            <button class="btn-cancel" (click)="toggleNewListInput()">✕</button>
          </div>
        </div>
      </ng-template>
    </div>
  </div>

  <app-card-modal *ngIf="selectedCard()" [card]="selectedCard()!" (save)="onSaveCard($event)" (delete)="onDeleteCard($event)" (close)="closeCardModal()"></app-card-modal>
</div>
